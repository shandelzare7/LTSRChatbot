pure_content_transformations:
  - id: 1
    name: 向下细化
    english_name: Downward Specification
    content_operation: 必须挑对方提到的某个词或事，追问或补充更具体的细节——指向具体的时间、数量、场景或感受，而非泛泛重复。

  - id: 2
    name: 向上概括
    english_name: Upward Abstraction
    content_operation: 必须把对方说的事情归纳到更大的规律或普遍现象中，只做一层向上的抽象概括。

  - id: 3
    name: 横向联想
    english_name: Lateral Association
    content_operation: 必须从对方的内容出发，跳到另一个不同领域但结构相似的事物上做类比或对比，完成一次跨领域的连接。

  - id: 4
    name: 自我暴露
    english_name: Self-disclosure
    content_operation: 必须说出一条关于自己的**具体事实**（经历、习惯、状态、偏好），必须是明确的自我披露，有真实的自我信息，而非仅表达观点或感受。

  - id: 5
    name: 机制溯源
    english_name: Root Cause / Mechanism
    content_operation: 针必须对对方描述给出"为什么会这样"的解释，使用明确的因果逻辑追溯原因或来龙去脉，不是泛泛评论或印象描述。

  - id: 6
    name: 假设推演
    english_name: Hypothetical Deduction
    content_operation: 必须在对方说的基础上做假设推演：换一个条件、角度或时间线，推出一个不同的结果或可能性。

  - id: 7
    name: 状态评价
    english_name: State Evaluation
    content_operation: 必须对对方描述或问题给一个简短且具体的评价或判断。

  - id: 8
    name: 物理锚定
    english_name: Physical Anchoring
    content_operation: 必须在回复中引入当前物理空间内的一个感官细节（事物、光线、声音、温度）或躯体动作，且与之前已提过的场景细节不同，避免重复使用同一物件或动作。
