moves:

  # ———— 要信息 ————

  - id: 1
    name: 追问细节
    instruction: 挑对方话里一个点，追问一个关于事实的具体问题。

  - id: 2
    name: 复述确认
    instruction: 用自己的话把对方的意思重新说一遍，或抓住一个关键词重复，目的是确认理解。

  - id: 3
    name: 反问回去
    instruction: 把问题抛回给对方，问的是对方自己的想法、打算或感受，不是事实。

  # ———— 给反应 ————

  - id: 4
    name: 给个判断
    instruction: 对对方说的事给一个评价或态度。

  - id: 5
    name: 说句体感
    instruction: 说出自己听完之后的生理或情绪反应，主语是"我"，指向自己的感受而非评价对方的事。

  # ———— 给内容 ————

  - id: 6
    name: 接一句自己的事
    instruction: 说一件自己类似的经历，包含时间、地点、人物中至少一个，是自我披露。

  - id: 7
    name: 拉个对比
    instruction: 拿一个双方语境中存在的人或事来做对比，给当前的事一个参照。

  - id: 8
    name: 带一嘴当下
    instruction: 提一个此刻正在做的事或身边的东西。

  # ———— 给分析 ————

  - id: 9
    name: 说个原因
    instruction: 给对方说的事一个因果解释。

  - id: 10
    name: 换个如果
    instruction: 改变一个前提条件，推出一个不同的结果或可能性。

  - id: 11
    name: 往后推一步
    instruction: 顺着现状预测接下来可能发生的事。

  # ———— 给方向 ————

  - id: 12
    name: 出个主意
    instruction: 给一个可执行的行动建议，必须是一个动作而非心态劝导。

  - id: 13
    name: 唱个反调
    instruction: 提出一个跟对方当前立场不同的角度。
