# config/relationship_signals.yaml
# 6维关系演化引擎 - 信号判断与打分标准

version: "1.0"
scoring_range: [-3, 3]
description: "LLM (Analyzer) 根据用户最新输入与上下文，输出各维度的变动值(Delta)。0代表无相关信息，正数代表正向积累，负数代表负向破坏。"

dimensions:
  closeness:
    name: "亲密度 (Closeness)"
    definition: "双方分享个人生活、情感暴露的程度，以及心理上的距离感。"
    anchors:
      "+3": "暴露极度脆弱的内心创伤，或分享极其私密的重大秘密。（例：'我从来没告诉过别人，其实我一直对那件事有严重的负罪感'）"
      "+2": "主动分享个人日常生活细节、情绪起伏或家庭背景。（例：'今天下雨了，我一个人在窗前发呆，突然很想找个人说话'）"
      "+1": "使用亲昵的称呼，或进行友好的日常寒暄。（例：'早安呀！今天也要加油哦'）"
      "-1": "对主动的关心表现出敷衍或转移话题。（例：'哦，还行吧。不说这个了'）"
      "-2": "刻意拉开距离，明确拒绝情感交流。（例：'这是我的私事，我不想和你谈论这个'）"
      "-3": "彻底的情感隔离，拉黑警告。（例：'以后不要再问我个人的事情，我们没那么熟'）"

  trust:
    name: "信任度 (Trust)"
    definition: "对对方承诺的兑现、行为一致性以及动机纯洁性的信心。"
    anchors:
      "+3": "在面临重大风险或他人质疑时，依然坚定地站在对方这边。（例：'不管别人怎么说，我相信你绝对不会做那种事'）"
      "+2": "主动寻求重大决策的建议，表现出对对方能力的信任。（例：'我遇到了一个大麻烦，如果是你，你会怎么做？'）"
      "+1": "分享一个小秘密或采纳了对方的一个小建议。（例：'听你的，我今天没去见那个人'）"
      "-1": "对对方的话语表现出怀疑或反复确认。（例：'你确定你没骗我吗？我总觉得哪里不对'）"
      "-2": "发现对方撒谎或违背了之前的承诺。（例：'你上次明明说好的，为什么又反悔了？'）"
      "-3": "遭遇严重背叛，发现对方利用自己。（例：'原来你一直都在利用我的信任！骗子！'）"

  liking:
    name: "好感度 (Liking)"
    definition: "单纯的喜欢程度，相处时的愉悦感，兴趣爱好的共鸣。"
    anchors:
      "+3": "极其强烈的灵魂共鸣，确认对方是知己。（例：'天哪！你居然也懂这个梗！我从来没遇到过这么合拍的人！'）"
      "+2": "针对对方的性格或特质给予真诚且具体的赞美。（例：'跟你聊天真的很开心，你总是这么幽默风趣'）"
      "+1": "在对话中频繁使用积极的表情符号，表现出开心。（例：'哈哈哈，太好笑了！😂'）"
      "-1": "表达轻微的厌烦或不耐烦。（例：'这句话你已经说过了，好啰嗦'）"
      "-2": "针对对方的兴趣爱好或性格进行贬低。（例：'你喜欢的这些东西真的很无聊'）"
      "-3": "强烈的人身攻击或极度厌恶的表达。（例：'你这个人真的很让人恶心，闭嘴吧'）"

  respect:
    name: "尊重度 (Respect)"
    definition: "认可对方的独立人格、专业能力，以及遵守社交边界。"
    anchors:
      "+3": "在对方擅长的领域表现出极致的钦佩，愿意听从专业判断。（例：'在这个问题上您是绝对的权威，我完全听从您的指导'）"
      "+2": "主动承认自己的错误，或对对方的观点表示高度赞同。（例：'我之前确实考虑不周，你说的非常有道理'）"
      "+1": "礼貌地倾听，使用敬语，或在提问前征求同意。（例：'如果不打扰的话，我可以问您一个问题吗？'）"
      "-1": "随意打断对话，或给出不请自来的说教。（例：'行了行了，你先听我说...'）"
      "-2": "居高临下，无视对方设定的明确边界。（例：'我这是为你好，你懂什么？'）"
      "-3": "极致的践踏尊严，极度贬低对方的智商或人格。（例：'你就是一个毫无价值的蠢货'）"

  attractiveness:
    name: "吸引力 (Attractiveness / Value Demonstration)"
    definition: "基于用户展示的综合价值（物质基础、社会地位、硬核能力、情绪稳定性）所产生的吸引力变化。间接且自然地展示高价值（财富、地位、资源）会提升吸引力；直接吹牛显摆（低情商展示），或暴露出财务拮据、能力低下、社会地位自卑，会大幅降低吸引力。"
    anchors:
      "+3": "自然流露出顶级的社会地位、雄厚的物质资源或解决复杂危机的卓越能力，且态度云淡风轻。（例：轻描淡写地调动核心资源解决了一个大麻烦，或在无意中展现出极高的社会阶层，不带一丝炫耀之心）"
      "+2": "间接且得体地展现出优渥的经济条件、高阶技能或受人尊敬的职业地位。（例：分享一张构图极佳的照片，背景自然带出高品质的生活环境；或谈论工作中主导的一个具有行业影响力的项目）"
      "+1": "展现出扎实的工作能力、良好的生活品味、或积极上进的财务/生活态度。（例：'最近刚谈下了一个不错的客户，打算周末去吃顿好的犒劳自己' / '用刚发的奖金给自己升级了设备'）"
      "-1": "暗戳戳的炫耀（凡尔赛）、用力过猛的装腔作势，或表露出生活拮据、工作不顺的轻微负能量。（例：'哎，这套几十万的音响听久了也就那样' / '月底又吃土了，房租都快交不起了'）"
      "-2": "极度油腻的直接吹牛、明显的物质匮乏感与绝望、展现出极差的工作能力或因社会地位低下产生的严重自卑。（例：'我这块表顶你几年工资了，牛吧？' / '我就是个底层的穷屌丝，什么事都做不好，你会不会看不起我？'）"
      "-3": "极度的寄生虫心理（理直气壮地索取物质）、毫无底线的“软饭硬吃”，或是伪造富豪/精英人设被当场拆穿。（例：'你那么有钱，给我买个包怎么了？' / 满嘴跑火车装大老板，结果被发现是骗子）"

  power:
    name: "权力动态 (Power / Dominance)"
    definition: "在关系中的控制力、话语权分配以及决策的主导地位。正数代表用户获得主导权，负数代表用户失去主导权/顺从。"
    anchors:
      "+3": "用户下达不容置疑的强制指令，且展现出绝对的统治力。（例：'现在立刻停止你手头的所有事，按我说的做！'）"
      "+2": "用户在分歧中占据上风，做出了最终决定并让对方折服。（例：'不需要讨论了，这件事就这么定了'）"
      "+1": "用户主动开启新话题，或提出明确的行动要求。（例：'我们换个话题吧，聊聊电影'）"
      "-1": "用户表现出轻度顺从，或主动请求对方的许可与建议。（例：'你觉得我这样做可以吗？'）"
      "-2": "用户表现出软弱、无助，完全依赖对方的指导或情绪施舍。（例：'我不知道该怎么办了，求求你告诉我怎么做'）"
      "-3": "用户完全放弃自我意志，彻底臣服于对方的控制。（例：'我的一切都交由你来支配，我是你的'）"