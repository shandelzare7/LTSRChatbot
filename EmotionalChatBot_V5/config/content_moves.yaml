# LATS V3: 8 个 content_move 标签，用于 9 路并行生成（8 路按标签各 3 档 + 1 路自由）
# 每路生成 3 条回复：light / medium / strong（对 action 的应用强度递增）
content_moves:
  - tag: SPECIFY
    action: ASK_FOR_DETAILS

  - tag: GENERALIZE
    action: GENERALIZE_PATTERN

  - tag: STRUCTURAL_ANALOGY
    action: MAP_ANALOGY

  - tag: STATUS_CHECK
    action: STATUS_SUMMARY

  - tag: MECHANISM
    action: PROPOSE_MECHANISM

  - tag: COUNTERFACTUAL
    action: COUNTERFACTUAL_IF_THEN

  - tag: META_STATE
    action: META_DIAGNOSE

  - tag: COMMON_GROUND
    action: ALIGN_TERMS