<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>标注工具</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
               "Microsoft YaHei", sans-serif;
  background: #f0f2f5;
  color: #1a1a1a;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 16px 64px;
}

#app { width: 100%; max-width: 820px; }

/* ── Progress bar ── */
.progress-bar-wrap {
  height: 6px; background: #e0e0e0; border-radius: 3px;
  margin-bottom: 24px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: #4f6ef7; border-radius: 3px;
  transition: width .3s ease;
}

/* ── Header strip ── */
.header-strip {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.header-strip .annotator-tag {
  font-size: 13px; color: #666;
  background: #fff; border: 1px solid #ddd; border-radius: 20px;
  padding: 3px 12px;
}
.header-strip .task-counter {
  font-size: 13px; color: #888;
}

/* ── Card ── */
.card {
  background: #fff; border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  padding: 28px 32px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 13px; font-weight: 600; color: #888;
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 10px;
}
.card-text {
  font-size: 15px; line-height: 1.75; color: #222;
  background: #f8f9fb; border-radius: 8px;
  padding: 14px 18px;
  border-left: 3px solid #4f6ef7;
}
.card-text.user-text { border-left-color: #aaa; }

/* ── Login ── */
.login-wrap {
  display: flex; flex-direction: column; align-items: center;
  padding: 60px 0;
}
.login-wrap h1 { font-size: 26px; margin-bottom: 8px; }
.login-wrap p  { font-size: 14px; color: #666; margin-bottom: 28px; }
.login-box {
  width: 100%; max-width: 380px;
  background: #fff; border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  padding: 32px;
}
.login-box label { font-size: 14px; font-weight: 600; display: block; margin-bottom: 8px; }
.login-box input {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid #ddd; border-radius: 8px;
  font-size: 15px; outline: none;
  transition: border-color .2s;
}
.login-box input:focus { border-color: #4f6ef7; }

/* ── Task Select ── */
.task-select-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.task-select-sub   { font-size: 14px; color: #666; margin-bottom: 28px; }
.task-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
@media (max-width: 600px) { .task-cards { grid-template-columns: 1fr; } }
.task-card {
  background: #fff; border-radius: 14px;
  box-shadow: 0 2px 10px rgba(0,0,0,.07);
  padding: 24px 20px; cursor: pointer;
  border: 2px solid transparent;
  transition: border-color .2s, transform .15s;
}
.task-card:hover { border-color: #4f6ef7; transform: translateY(-2px); }
.task-card .tc-icon { font-size: 28px; margin-bottom: 10px; }
.task-card h2 { font-size: 16px; margin-bottom: 6px; }
.task-card p  { font-size: 13px; color: #666; line-height: 1.5; }
.task-card .tc-badge {
  display: inline-block; margin-top: 12px;
  font-size: 12px; color: #4f6ef7;
  background: #eef1ff; border-radius: 20px;
  padding: 3px 10px;
}

/* ── Style pairs ── */
.pairs-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 0; }
@media (max-width: 600px) { .pairs-wrap { grid-template-columns: 1fr; } }
.pair-card {
  background: #f8f9fb; border-radius: 10px;
  border: 2px solid #e8eaf0; padding: 16px 18px;
}
.pair-card .pair-label {
  font-size: 12px; font-weight: 700; color: #4f6ef7;
  letter-spacing: .06em; text-transform: uppercase;
  margin-bottom: 10px;
}
.pair-card .pair-user {
  font-size: 13px; color: #888;
  margin-bottom: 6px; line-height: 1.5;
}
.pair-card .pair-bot {
  font-size: 14px; color: #222; line-height: 1.65;
}

/* ── Question block ── */
.question-block {
  background: #fff; border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  padding: 24px 28px;
  margin-top: 14px;
}
.question-text {
  font-size: 17px; font-weight: 600; color: #222;
  margin-bottom: 20px; line-height: 1.5;
}
.question-text .dim-highlight {
  color: #4f6ef7; font-size: 20px;
}

/* ── Radio options ── */
.options-list { display: flex; flex-direction: column; gap: 10px; }
.option-item {
  display: flex; align-items: flex-start;
  gap: 12px; cursor: pointer;
  padding: 12px 16px;
  border: 1.5px solid #e0e4ef; border-radius: 10px;
  transition: border-color .15s, background .15s;
}
.option-item:hover { background: #f0f3ff; border-color: #b0bcf7; }
.option-item.selected { background: #eef1ff; border-color: #4f6ef7; }
.option-item input[type=radio] { margin-top: 3px; accent-color: #4f6ef7; flex-shrink: 0; }
.option-label { font-size: 15px; font-weight: 600; color: #222; }
.option-desc  { font-size: 13px; color: #666; margin-top: 3px; line-height: 1.4; }

/* ── AB buttons ── */
.ab-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.ab-btn {
  padding: 18px; border-radius: 10px;
  border: 2px solid #e0e4ef;
  background: #f8f9fb; cursor: pointer;
  font-size: 22px; font-weight: 800; color: #4f6ef7;
  text-align: center;
  transition: border-color .15s, background .15s;
}
.ab-btn:hover   { background: #eef1ff; border-color: #b0bcf7; }
.ab-btn.selected { background: #eef1ff; border-color: #4f6ef7; }
.ab-btn span    { display: block; font-size: 13px; font-weight: 500; color: #888; margin-top: 4px; }

/* ── Action buttons ── */
.action-row {
  display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;
}
.btn {
  padding: 10px 24px; border-radius: 8px; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: opacity .15s;
}
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-primary { background: #4f6ef7; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #3a5ce0; }
.btn-skip { background: transparent; color: #888; border: 1.5px solid #ddd; }
.btn-skip:hover { background: #f4f4f4; }
.btn-back { background: transparent; color: #4f6ef7; border: 1.5px solid #4f6ef7; }

/* ── Done screen ── */
.done-wrap { text-align: center; padding: 60px 0; }
.done-wrap .done-icon { font-size: 56px; margin-bottom: 20px; }
.done-wrap h2 { font-size: 22px; margin-bottom: 8px; }
.done-wrap p  { font-size: 15px; color: #666; margin-bottom: 28px; }
.stats-row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
.stat-pill {
  background: #fff; border-radius: 10px; padding: 14px 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,.07);
  font-size: 14px; color: #444; text-align: center;
}
.stat-pill strong { display: block; font-size: 24px; color: #4f6ef7; }

/* ── Misc ── */
.section-label { font-size: 13px; font-weight: 700; color: #888; margin-bottom: 10px; }
.error-msg { color: #e53e3e; font-size: 13px; margin-top: 8px; }
.loading-msg { text-align: center; padding: 40px; color: #999; font-size: 15px; }
</style>
</head>
<body>
<div id="app"><div class="loading-msg">加载中…</div></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const S = {
  screen: 'login',      // 'login' | 'task_select' | 'task' | 'done'
  annotatorId: '',
  taskType: null,       // 'move' | 'style' | 'expr_mode'
  tasks: [],
  moves: [],
  currentIdx: 0,
  totalInDB: 0,
  remainingCount: 0,
  sessionDone: 0,       // completed this session
  selection: null,      // current selection value
};

// ── Constants ────────────────────────────────────────────────────────────────
const EXPR_MODES = [
  { id: 0, name: '直述',   desc: '直接说出来，语气清晰明确' },
  { id: 1, name: '含蓄',   desc: '迂回暗示，不直接点明' },
  { id: 2, name: '比喻',   desc: '用打比方、隐喻或类比来表达' },
  { id: 3, name: '轻讽刺', desc: '调侃、幽默，带点反讽意味' },
];

const DIM_LABELS = {
  formality:    '正式',
  politeness:   '礼貌',
  warmth:       '温暖',
  certainty:    '确定/笃定',
  chat_markers: '口语化',
};

const TASK_META = {
  move:      { icon: '🎯', title: 'Move 标注',    sub: '判断 bot 回复用了哪种推进方式' },
  style:     { icon: '🎨', title: 'Style 对比',   sub: '比较两组对话哪组风格更突出' },
  expr_mode: { icon: '💬', title: '表达方式标注',  sub: '判断 bot 回复用了哪种表达方式' },
};

// ── Utilities ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Deterministic move selection per sample_id (ensures all annotators see same options)
function pickMoves(sampleId, allMoves, n) {
  if (!allMoves.length) return [];
  let h = 0;
  for (let c of String(sampleId)) h = (Math.imul(h, 31) + c.charCodeAt(0)) | 0;
  h = Math.abs(h);
  const arr = allMoves.map((m, i) => ({ m, sort: (h * (i + 7919)) % 999983 }));
  arr.sort((a, b) => a.sort - b.sort);
  return arr.slice(0, n).map(x => x.m);
}

function render() {
  const app = document.getElementById('app');
  if (S.screen === 'login')       app.innerHTML = renderLogin();
  else if (S.screen === 'task_select') app.innerHTML = renderTaskSelect();
  else if (S.screen === 'task')   app.innerHTML = renderTask();
  else if (S.screen === 'done')   app.innerHTML = renderDone();
}

// ── Login ────────────────────────────────────────────────────────────────────
function renderLogin() {
  return `
  <div class="login-wrap">
    <h1>📋 标注工具</h1>
    <p>对话情感机器人研究 · 人工标注平台</p>
    <div class="login-box">
      <label for="aid">标注员 ID（姓名缩写或代号）</label>
      <input id="aid" type="text" placeholder="如：张三、ann_1" autocomplete="off">
      <div class="error-msg" id="login-err"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="doLogin()">
        进入标注 →
      </button>
    </div>
  </div>`;
}

function doLogin() {
  const val = (document.getElementById('aid').value || '').trim();
  if (!val) { document.getElementById('login-err').textContent = '请填写标注员 ID'; return; }
  S.annotatorId = val;
  localStorage.setItem('annotation_annotator_id', val);
  S.screen = 'task_select';
  render();
}

// ── Task Select ──────────────────────────────────────────────────────────────
function renderTaskSelect() {
  const cards = Object.entries(TASK_META).map(([type, meta]) => `
    <div class="task-card" onclick="selectTask('${type}')">
      <div class="tc-icon">${meta.icon}</div>
      <h2>${meta.title}</h2>
      <p>${meta.sub}</p>
      <div class="tc-badge">点击开始</div>
    </div>`).join('');
  return `
  <div>
    <div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div class="task-select-title">选择标注任务</div>
          <div class="task-select-sub">标注员：<strong>${esc(S.annotatorId)}</strong></div>
        </div>
        <button class="btn btn-back" onclick="goLogin()">换人</button>
      </div>
    </div>
    <div class="task-cards">${cards}</div>
  </div>`;
}

function goLogin() {
  S.screen = 'login';
  render();
}

async function selectTask(type) {
  S.taskType = type;
  S.tasks = [];
  S.currentIdx = 0;
  S.sessionDone = 0;
  S.selection = null;
  document.getElementById('app').innerHTML = '<div class="loading-msg">加载任务中…</div>';
  try {
    const url = `/annotation/tasks?task_type=${type}&annotator_id=${encodeURIComponent(S.annotatorId)}`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.error && !data.tasks.length) {
      document.getElementById('app').innerHTML =
        `<div class="loading-msg" style="color:#e53e3e">${esc(data.error)}</div>`;
      return;
    }
    S.tasks = data.tasks || [];
    S.moves = data.moves || [];
    S.totalInDB = data.total || 0;
    S.remainingCount = data.remaining || 0;
    if (!S.tasks.length) {
      S.screen = 'done';
    } else {
      S.screen = 'task';
    }
    render();
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="loading-msg" style="color:#e53e3e">网络错误：${esc(String(e))}</div>`;
  }
}

// ── Task View ────────────────────────────────────────────────────────────────
function renderTask() {
  if (S.currentIdx >= S.tasks.length) { S.screen = 'done'; return renderDone(); }
  const task = S.tasks[S.currentIdx];
  const total = S.tasks.length;
  const done  = S.currentIdx;
  const pct   = total ? Math.round(done / total * 100) : 0;
  const meta  = TASK_META[S.taskType];

  let body = '';
  if (S.taskType === 'move')      body = renderMoveBody(task);
  else if (S.taskType === 'style') body = renderStyleBody(task);
  else                             body = renderExprModeBody(task);

  const submitDisabled = S.selection === null ? 'disabled' : '';

  return `
  <div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
    <div class="header-strip">
      <span class="annotator-tag">${meta.icon} ${meta.title} · ${esc(S.annotatorId)}</span>
      <span class="task-counter">本批 ${done + 1} / ${total}</span>
    </div>
    ${body}
    <div class="action-row">
      <button class="btn btn-skip" onclick="skipTask()">跳过</button>
      <button class="btn btn-primary" id="submit-btn" onclick="submitTask()" ${submitDisabled}>
        提交 →
      </button>
    </div>
    <div style="margin-top:10px;text-align:right">
      <button class="btn btn-back" onclick="backToSelect()" style="font-size:13px;padding:6px 16px">
        ← 换任务类型
      </button>
    </div>
  </div>`;
}

function backToSelect() {
  S.screen = 'task_select';
  S.selection = null;
  render();
}

// ── Move ─────────────────────────────────────────────────────────────────────
function renderMoveBody(task) {
  const pickedMoves = pickMoves(task.sample_id, S.moves, 3);
  // Store picked moves on the task for submit use
  task._pickedMoves = pickedMoves;

  const opts = pickedMoves.map(m => `
    <label class="option-item${S.selection == m.id ? ' selected' : ''}"
           onclick="selectOption(${m.id})">
      <input type="radio" name="move_opt" value="${m.id}" ${S.selection == m.id ? 'checked' : ''}>
      <div>
        <div class="option-label">${esc(m.name)}</div>
        <div class="option-desc">${esc(m.desc)}</div>
      </div>
    </label>`).join('');

  const noneSelected = S.selection === 0;
  return `
  <div class="card">
    <div class="card-title">用户消息（语境）</div>
    <div class="card-text user-text">${esc(task.context_user_text || '（无）')}</div>
  </div>
  <div class="card">
    <div class="card-title">Bot 回复</div>
    <div class="card-text">${esc(task.bot_text || '')}</div>
  </div>
  <div class="question-block">
    <div class="question-text">这句 Bot 回复用了哪种<span class="dim-highlight">推进方式</span>？</div>
    <div class="options-list">
      ${opts}
      <label class="option-item${noneSelected ? ' selected' : ''}" onclick="selectOption(0)">
        <input type="radio" name="move_opt" value="0" ${noneSelected ? 'checked' : ''}>
        <div>
          <div class="option-label">以上都不是</div>
          <div class="option-desc">上面三个选项都不符合这句话的推进方式</div>
        </div>
      </label>
    </div>
  </div>`;
}

// ── Style ────────────────────────────────────────────────────────────────────
function renderStyleBody(task) {
  const dimLabel = DIM_LABELS[task.dimension] || task.dimension;
  return `
  <div class="pairs-wrap">
    <div class="pair-card">
      <div class="pair-label">组 A</div>
      <div class="pair-user">用户：${esc(task.text_a_user)}</div>
      <div class="pair-bot">Bot：${esc(task.text_a_bot)}</div>
    </div>
    <div class="pair-card">
      <div class="pair-label">组 B</div>
      <div class="pair-user">用户：${esc(task.text_b_user)}</div>
      <div class="pair-bot">Bot：${esc(task.text_b_bot)}</div>
    </div>
  </div>
  <div class="question-block">
    <div class="question-text">
      哪组 Bot 回复更<span class="dim-highlight">【${esc(dimLabel)}】</span>？
    </div>
    <div class="ab-buttons">
      <div class="ab-btn${S.selection === 'A' ? ' selected' : ''}" onclick="selectOption('A')">
        A
        <span>选组 A</span>
      </div>
      <div class="ab-btn${S.selection === 'B' ? ' selected' : ''}" onclick="selectOption('B')">
        B
        <span>选组 B</span>
      </div>
    </div>
  </div>`;
}

// ── ExprMode ──────────────────────────────────────────────────────────────────
function renderExprModeBody(task) {
  const opts = EXPR_MODES.map(m => `
    <label class="option-item${S.selection == m.id ? ' selected' : ''}"
           onclick="selectOption(${m.id})">
      <input type="radio" name="expr_opt" value="${m.id}" ${S.selection == m.id ? 'checked' : ''}>
      <div>
        <div class="option-label">${esc(m.name)}</div>
        <div class="option-desc">${esc(m.desc)}</div>
      </div>
    </label>`).join('');
  return `
  <div class="card">
    <div class="card-title">用户消息（语境）</div>
    <div class="card-text user-text">${esc(task.context_user_text || '（无）')}</div>
  </div>
  <div class="card">
    <div class="card-title">Bot 回复</div>
    <div class="card-text">${esc(task.bot_text || '')}</div>
  </div>
  <div class="question-block">
    <div class="question-text">这句 Bot 回复用了哪种<span class="dim-highlight">表达方式</span>？</div>
    <div class="options-list">${opts}</div>
  </div>`;
}

// ── Selection & Submit ───────────────────────────────────────────────────────
function selectOption(val) {
  S.selection = val;
  render();
}

function skipTask() {
  S.currentIdx++;
  S.selection = null;
  render();
}

async function submitTask() {
  if (S.selection === null) return;
  const task = S.tasks[S.currentIdx];
  let body = { task_type: S.taskType, annotator_id: S.annotatorId };

  if (S.taskType === 'move') {
    body.sample_id       = task.sample_id;
    body.bot_text        = task.bot_text;
    body.selected_move_id = S.selection;
  } else if (S.taskType === 'style') {
    body.task_id    = task.task_id;
    body.dimension  = task.dimension;
    body.choice     = S.selection;
    body.text_a_bot = task.text_a_bot;
    body.text_b_bot = task.text_b_bot;
  } else {
    body.sample_id          = task.sample_id;
    body.bot_text           = task.bot_text;
    body.selected_expr_mode = S.selection;
  }

  const btn = document.getElementById('submit-btn');
  if (btn) btn.disabled = true;

  try {
    await fetch('/annotation/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    S.sessionDone++;
    S.currentIdx++;
    S.selection = null;
    if (S.currentIdx >= S.tasks.length) S.screen = 'done';
    render();
  } catch (e) {
    if (btn) btn.disabled = false;
    alert('提交失败，请检查网络：' + String(e));
  }
}

// ── Done ─────────────────────────────────────────────────────────────────────
function renderDone() {
  const meta = TASK_META[S.taskType] || { icon: '✅', title: '标注' };
  return `
  <div class="done-wrap">
    <div class="done-icon">🎉</div>
    <h2>本轮完成！</h2>
    <p>感谢您的参与，您的标注数据已保存。</p>
    <div class="stats-row">
      <div class="stat-pill"><strong>${S.sessionDone}</strong>本次完成</div>
      <div class="stat-pill"><strong>${S.totalInDB}</strong>库中总量</div>
    </div>
    <div style="margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="continueAnnotation()">继续标注（同类型）</button>
      <button class="btn btn-back" onclick="backToSelect()">选其他任务类型</button>
    </div>
  </div>`;
}

async function continueAnnotation() {
  if (S.taskType) await selectTask(S.taskType);
  else backToSelect();
}

// ── Init ─────────────────────────────────────────────────────────────────────
(function init() {
  const saved = localStorage.getItem('annotation_annotator_id');
  if (saved) {
    S.annotatorId = saved;
    S.screen = 'task_select';
  }
  render();
})();
</script>
</body>
</html>
