# 所有 LLM 模型配置只改这一处。API Key 仍在 .env，不写在此文件。
# 环境变量 LTSR_LLM_PRESET / LTSR_LLM_*_MODEL 等可覆盖下方默认（用于按环境区分）。

# main: InnerMonologue / Judge（gpt-4o）
# fast: Detection / Extract / Safety / Processor / Evolver / MemoryManager（gpt-4o-mini）
# generate: 并行候选生成（qwen，单独配置见下方）
roles:
  main:
    model: gpt-4o
    base_url: https://api.openai.com/v1
  fast:
    model: gpt-4o-mini
    base_url: https://api.openai.com/v1
  judge:
    model: gpt-4o-mini
    base_url: https://api.openai.com/v1

# 生成节点（Generate）：并行多路回复生成，单独配置
# 用 OpenAI 时 API Key 取 .env 的 OPENAI_API_KEY 或 LTSR_GEN_API_KEY；用 Qwen 时取 QWEN_API_KEY
generate:
  model: qwen3-next-80b-a3b-instruct
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  temperature: 1.0
  top_p: 0.95
  presence_penalty: 0.3
  n: 4
