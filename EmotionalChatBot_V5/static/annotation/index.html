<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>标注工具</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
               "Microsoft YaHei", sans-serif;
  background: #f0f2f5;
  color: #1a1a1a;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 16px 64px;
}

#app { width: 100%; max-width: 820px; }

/* ── Progress bar ── */
.progress-bar-wrap {
  height: 6px; background: #e0e0e0; border-radius: 3px;
  margin-bottom: 24px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: #4f6ef7; border-radius: 3px;
  transition: width .3s ease;
}

/* ── Header strip ── */
.header-strip {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.header-strip .annotator-tag {
  font-size: 13px; color: #666;
  background: #fff; border: 1px solid #ddd; border-radius: 20px;
  padding: 3px 12px;
}
.header-strip .task-counter {
  font-size: 13px; color: #888;
}

/* ── Card (legacy) ── */
.card {
  background: #fff; border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  padding: 28px 32px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 13px; font-weight: 600; color: #888;
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 10px;
}
.card-text {
  font-size: 15px; line-height: 1.75; color: #222;
  background: #f8f9fb; border-radius: 8px;
  padding: 14px 18px;
  border-left: 3px solid #4f6ef7;
}
.card-text.user-text { border-left-color: #aaa; }

/* ── Chat bubbles ── */
.chat-wrap {
  background: #fff; border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  padding: 16px 18px;
  margin-bottom: 14px;
  display: flex; flex-direction: column; gap: 8px;
}
.bubble-row {
  display: flex; align-items: flex-end; gap: 8px;
}
.bubble-row.user { justify-content: flex-end; }
.bubble-row.bot  { justify-content: flex-start; }
.bubble-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  font-size: 13px; font-weight: 700; color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.bubble-row.user .bubble-avatar { background: #aab; order: 2; }
.bubble-row.bot  .bubble-avatar { background: #4f6ef7; }
.bubble {
  max-width: 78%; padding: 10px 14px;
  font-size: 14px; line-height: 1.65; color: #222;
  border-radius: 14px; word-break: break-word;
}
.bubble-row.user .bubble {
  background: #f0f1f3; border-bottom-right-radius: 4px;
}
.bubble-row.bot .bubble {
  background: #eef1ff; border-bottom-left-radius: 4px;
}
.bubble-row.bot.highlight .bubble {
  background: #dde3ff; border: 2px solid #4f6ef7;
}

/* ── Login ── */
.login-wrap {
  display: flex; flex-direction: column; align-items: center;
  padding: 60px 0;
}
.login-wrap h1 { font-size: 26px; margin-bottom: 8px; }
.login-wrap p  { font-size: 14px; color: #666; margin-bottom: 28px; }
.login-box {
  width: 100%; max-width: 380px;
  background: #fff; border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,.08);
  padding: 32px;
}
.login-box label { font-size: 14px; font-weight: 600; display: block; margin-bottom: 8px; }
.login-box input {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid #ddd; border-radius: 8px;
  font-size: 15px; outline: none;
  transition: border-color .2s;
}
.login-box input:focus { border-color: #4f6ef7; }

/* ── Style pairs ── */
.pairs-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 0; }
@media (max-width: 600px) { .pairs-wrap { grid-template-columns: 1fr; } }
.pair-card {
  background: #f8f9fb; border-radius: 10px;
  border: 2px solid #e8eaf0; padding: 16px 18px;
}
.pair-card .pair-label {
  font-size: 12px; font-weight: 700; color: #4f6ef7;
  letter-spacing: .06em; text-transform: uppercase;
  margin-bottom: 10px;
}
.pair-card .pair-user {
  font-size: 13px; color: #888;
  margin-bottom: 6px; line-height: 1.5;
}
.pair-card .pair-bot {
  font-size: 14px; color: #222; line-height: 1.65;
}

/* ── Question block ── */
.question-block {
  background: #fff; border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  padding: 24px 28px;
  margin-top: 14px;
}
.question-text {
  font-size: 17px; font-weight: 600; color: #222;
  margin-bottom: 20px; line-height: 1.5;
}
.question-text .dim-highlight {
  color: #4f6ef7; font-size: 20px;
}

/* ── Choice buttons ── */
.choice-grid { display: grid; gap: 10px; }
.choice-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.choice-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.choice-grid.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.choice-grid.cols-5 { grid-template-columns: repeat(5, 1fr); }
@media (max-width: 600px) {
  .choice-grid.cols-3, .choice-grid.cols-4, .choice-grid.cols-5 { grid-template-columns: 1fr 1fr; }
}
.choice-btn {
  padding: 14px 10px; border-radius: 10px;
  border: 2px solid #e0e4ef;
  background: #f8f9fb; cursor: pointer;
  text-align: center;
  transition: border-color .15s, background .15s;
}
.choice-btn:hover { background: #eef1ff; border-color: #b0bcf7; }
.choice-btn.selected { background: #eef1ff; border-color: #4f6ef7; }
.choice-btn .choice-name {
  font-size: 15px; font-weight: 700; color: #4f6ef7;
}
.choice-btn .choice-desc {
  font-size: 12px; color: #888; margin-top: 4px; line-height: 1.3;
}

/* ── Action buttons ── */
.action-row {
  display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;
}
.btn {
  padding: 10px 24px; border-radius: 8px; border: none;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: opacity .15s;
}
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-primary { background: #4f6ef7; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #3a5ce0; }
.btn-skip { background: transparent; color: #888; border: 1.5px solid #ddd; }
.btn-skip:hover { background: #f4f4f4; }
.btn-back { background: transparent; color: #4f6ef7; border: 1.5px solid #4f6ef7; }

/* ── Done screen ── */
.done-wrap { text-align: center; padding: 60px 0; }
.done-wrap .done-icon { font-size: 56px; margin-bottom: 20px; }
.done-wrap h2 { font-size: 22px; margin-bottom: 8px; }
.done-wrap p  { font-size: 15px; color: #666; margin-bottom: 28px; }
.stats-row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
.stat-pill {
  background: #fff; border-radius: 10px; padding: 14px 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,.07);
  font-size: 14px; color: #444; text-align: center;
}
.stat-pill strong { display: block; font-size: 24px; color: #4f6ef7; }

/* ── Misc ── */
.section-label { font-size: 13px; font-weight: 700; color: #888; margin-bottom: 10px; }
.error-msg { color: #e53e3e; font-size: 13px; margin-top: 8px; }
.loading-msg { text-align: center; padding: 40px; color: #999; font-size: 15px; }
</style>
</head>
<body>
<div id="app"><div class="loading-msg">加载中…</div></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const S = {
  screen: 'login',      // 'login' | 'tutorial' | 'task' | 'done'
  annotatorId: '',
  tasks: [],            // mixed: each task has .task_type
  moves: [],
  currentIdx: 0,
  totalTasks: 0,
  doneCount: 0,         // already submitted before this session
  sessionDone: 0,       // distinct tasks completed this session
  submittedTaskIds: {}, // { task_id: true } 本 session 已提交过的题，避免上一题再做一遍重复 +1
  selection: null,
};

// ── Constants ────────────────────────────────────────────────────────────────
const EXPR_MODES = [
  { id: 0, name: '直述',   desc: '直接说出来，语气清晰明确' },
  { id: 1, name: '含蓄',   desc: '迂回暗示，不直接点明' },
  { id: 2, name: '比喻',   desc: '用打比方、隐喻或类比来表达' },
  { id: 3, name: '轻讽刺', desc: '调侃、幽默，带点反讽意味' },
];

const DIM_LABELS = {
  FORMALITY:           '正式',
  POLITENESS:          '礼貌',
  FRIENDLINESS:        '友善',
  CERTAINTY:           '确定',
  EMOTIONAL_TONE:      '情感浓度',
};

// 成对比较按钮文字，部分维度"更X"不通顺时单独指定
const DIM_COMPARE_LABELS = {
  EMOTIONAL_TONE: '情感更浓烈',
};

const DIM_EXAMPLES = {
  FORMALITY: {
    desc: '说话的书面感 / 口语感程度（≠认真详细，≠话题严肃；看用词是否规范书面）',
    EL: '写得挺棒的！整体很溜～',
    L:  '写得挺棒的，整体很清晰！',
    M:  '报告整体写得不错，结构清晰，内容充实。',
    H:  '报告整体撰写优良，结构严谨，内容详实。',
    EH: '报告整体撰写精良，结构严谨，内容详实，堪称典范。',
  },
  POLITENESS: {
    desc: '措辞是否体现礼节和客气（≠友善亲近，≠话多；看有无礼貌用语如请/谢谢/抱歉）',
    EL: '迟到是我不对，下次别等我。',
    L:  '对不住，我迟到了，怪我。',
    M:  '抱歉，我昨天迟到了，给大家添麻烦了。',
    H:  '非常抱歉，我昨天开会迟到了，给大家添麻烦了，深感愧疚。',
    EH: '深感抱歉，因我迟到耽误大家宝贵时间，诚恳致歉。',
  },
  FRIENDLINESS: {
    desc: '是否主动向对方靠近、拉近关系（≠礼貌客气，≠热情话多；看亲近感）',
    EL: '没空，别找我。',
    L:  '这周末没空，别约了。',
    M:  '这周末有点忙，没法出去玩啦～希望下次有机会再约！',
    H:  '哎呀真不巧，这周末已经排满啦～下次一定补上！💖',
    EH: '啊啊啊好想跟你去玩！😭 但这周末真的被一堆事塞满了，心碎成小星星～下次一定补上抱抱！✨',
  },
  CERTAINTY: {
    desc: '说话是否果断直接、不用模糊词（≠内容自信，≠经验丰富；看有无"可能/感觉/大概"等）',
    EL: '可能吧…我瞅了眼云，但风向老变，真说不准。',
    L:  '可能吧，我看天气有点阴，但也不敢确定明天一定会下雨。',
    M:  '我觉得明天有点可能下雨，但也不太确定，最好还是带把伞以防万一。',
    H:  '明天肯定会下雨，我已经看过了天气预报，雨势不小。',
    EH: '明天肯定下雨，我百分之百确定。',
  },
  EMOTIONAL_TONE: {
    desc: '情绪表达的激烈程度，不区分正负（≠正面情绪，≠友善；愤怒和兴奋都算高）',
    EL: '真好啊。我也想去了。',
    L:  '听起来挺舒服的，我也想去走走。',
    M:  '真好啊，我也好想去找个安静的公园走走。',
    H:  '啊啊啊好羡慕！我也好想现在就冲去公园散步啊～🌞🍃',
    EH: '啊啊啊好羡慕！！！我好想立刻冲去公园呼吸新鲜空气、晒太阳、当一只快乐的小松鼠啊！！！',
  },
};

const TIER_LABELS = [
  { id: 'EL', name: '极低' },
  { id: 'L',  name: '低' },
  { id: 'M',  name: '中' },
  { id: 'H',  name: '高' },
  { id: 'EH', name: '极高' },
];

const MOVE_LABELS = {
  1:  { name: '追问细节', desc: '挑对方话里一个点，追问一个关于事实的具体问题' },
  2:  { name: '复述确认', desc: '用自己的话把对方的意思重新说一遍，或抓住关键词重复，确认理解' },
  3:  { name: '反问回去', desc: '把问题抛回给对方，问的是对方自己的想法、打算或感受' },
  4:  { name: '给个判断', desc: '对对方说的事给一个评价或态度' },
  5:  { name: '说句体感', desc: '说出自己听完之后的生理或情绪反应，主语是"我"' },
  6:  { name: '接一句自己的事', desc: '说一件自己类似的经历，是自我披露' },
  7:  { name: '拉个对比', desc: '拿一个双方语境中存在的人或事来做对比' },
  8:  { name: '带一嘴当下', desc: '提一个此刻正在做的事或身边的东西' },
  9:  { name: '说个原因', desc: '给对方说的事一个因果解释' },
  10: { name: '换个如果', desc: '改变一个前提条件，推出一个不同的结果或可能性' },
  11: { name: '往后推一步', desc: '顺着现状预测接下来可能发生的事' },
  12: { name: '出个主意', desc: '给一个可执行的行动建议，必须是一个动作而非心态劝导' },
  13: { name: '唱个反调', desc: '提出一个跟对方当前立场不同的角度' },
};

const TASK_META = {
  move:          { icon: '🎯', title: 'Move 标注' },
  style_compare: { icon: '🎨', title: 'Style 对比' },
  style_label:   { icon: '📊', title: 'Style 评级' },
  expr_mode:     { icon: '💬', title: '表达方式标注' },
};

// ── Utilities ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function pickMoves(taskId, n, mustIncludeId) {
  const all = Object.entries(MOVE_LABELS).map(([id, m]) => ({ id: Number(id), ...m }));
  let h = 0;
  for (let c of String(taskId)) h = (Math.imul(h, 31) + c.charCodeAt(0)) | 0;
  h = Math.abs(h);

  // If mustIncludeId is set, guarantee it's in the result
  let forced = null;
  let rest = all;
  if (mustIncludeId && MOVE_LABELS[mustIncludeId]) {
    forced = { id: mustIncludeId, ...MOVE_LABELS[mustIncludeId] };
    rest = all.filter(m => m.id !== mustIncludeId);
  }

  const arr = rest.map((m, i) => ({ m, sort: (h * (i + 7919)) % 999983 }));
  arr.sort((a, b) => a.sort - b.sort);
  const picks = arr.slice(0, forced ? n - 1 : n).map(x => x.m);

  if (forced) picks.push(forced);

  // Shuffle picks deterministically so forced answer isn't always last
  const shuffled = picks.map((m, i) => ({ m, sort: (h * (i + 1301)) % 999961 }));
  shuffled.sort((a, b) => a.sort - b.sort);
  return shuffled.map(x => x.m);
}

function render() {
  const app = document.getElementById('app');
  if (S.screen === 'login')       app.innerHTML = renderLogin();
  else if (S.screen === 'tutorial') app.innerHTML = renderTutorial();
  else if (S.screen === 'task')   app.innerHTML = renderTask();
  else if (S.screen === 'done')   app.innerHTML = renderDone();
}

// ── Login ────────────────────────────────────────────────────────────────────
function renderLogin() {
  return `
  <div class="login-wrap">
    <h1>标注工具</h1>
    <p>对话情感机器人研究 · 人工标注平台</p>
    <div class="login-box">
      <label for="aid">标注员 ID（姓名缩写或代号）</label>
      <input id="aid" type="text" placeholder="如：张三、ann_1" autocomplete="off">
      <div class="error-msg" id="login-err"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:16px;padding:14px 24px;font-size:17px" onclick="doLogin()">
        开始标注
      </button>
    </div>
  </div>`;
}

async function doLogin() {
  const val = (document.getElementById('aid').value || '').trim();
  if (!val) { document.getElementById('login-err').textContent = '请填写标注员 ID'; return; }
  S.annotatorId = val;
  localStorage.setItem('annotation_annotator_id', val);
  S.screen = 'tutorial';
  render();
}

function goLogin() {
  localStorage.removeItem('annotation_annotator_id');
  S.screen = 'login';
  render();
}

// ── Tutorial ─────────────────────────────────────────────────────────────────
function renderTutorial() {
  const TIERS_ORDER = ['EL', 'L', 'M', 'H', 'EH'];
  const TIER_NAMES = { EL: '极低', L: '低', M: '中', H: '高', EH: '极高' };
  const TIER_COLORS = { EL: '#c0392b', L: '#e67e22', M: '#7f8c8d', H: '#2980b9', EH: '#2d8a4e' };

  let dimSections = '';
  for (const [dim, label] of Object.entries(DIM_LABELS)) {
    const ex = DIM_EXAMPLES[dim];
    if (!ex) continue;
    let rows = TIERS_ORDER.map(t => `
      <div style="display:flex;align-items:baseline;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0">
        <span style="font-weight:700;color:${TIER_COLORS[t]};min-width:36px;font-size:13px">${TIER_NAMES[t]}</span>
        <span style="font-size:14px;color:#333">${esc(ex[t])}</span>
      </div>`).join('');

    dimSections += `
    <div style="background:#fff;border-radius:12px;padding:20px 24px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.06)">
      <div style="font-size:16px;font-weight:700;color:#4f6ef7;margin-bottom:4px">${esc(label)}</div>
      <div style="font-size:13px;color:#888;margin-bottom:12px">${esc(ex.desc)}</div>
      ${rows}
    </div>`;
  }

  return `
  <div style="max-width:680px;margin:0 auto">
    <h2 style="font-size:22px;margin-bottom:6px">标注指南</h2>
    <p style="font-size:14px;color:#666;margin-bottom:20px">
      请先阅读以下 5 个语言风格维度的定义和示例，了解每个档位的含义后再开始标注。
    </p>
    ${dimSections}
    <div style="text-align:center;margin-top:24px">
      <button class="btn btn-primary" style="padding:14px 48px;font-size:17px" onclick="startFromTutorial()">
        我已了解，开始标注
      </button>
    </div>
  </div>`;
}

async function startFromTutorial() {
  await loadTasks();
}

// ── Load Tasks ───────────────────────────────────────────────────────────────
async function loadTasks() {
  S.tasks = [];
  S.currentIdx = 0;
  S.sessionDone = 0;
  S.submittedTaskIds = {};
  S.selection = null;
  document.getElementById('app').innerHTML = '<div class="loading-msg">正在生成任务…</div>';
  try {
    const resp = await fetch(
      `/annotation/tasks?annotator_id=${encodeURIComponent(S.annotatorId)}`
    );
    const data = await resp.json();

    if (data.error) {
      document.getElementById('app').innerHTML =
        `<div class="loading-msg" style="color:#e53e3e">${esc(data.error)}
         <div style="margin-top:20px">
           <button class="btn btn-primary" onclick="loadTasks()">重试</button>
           <button class="btn btn-back" style="margin-left:8px" onclick="goLogin()">重新登录</button>
         </div></div>`;
      return;
    }

    S.tasks = data.tasks || [];
    S.totalTasks = data.total || 0;
    S.doneCount = data.done || 0;
    if (data.moves) S.moves = data.moves;

    if (!S.tasks.length) {
      S.screen = 'done';
    } else {
      S.screen = 'task';
    }
    render();
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="loading-msg" style="color:#e53e3e">网络错误：${esc(String(e))}
       <div style="margin-top:20px">
         <button class="btn btn-primary" onclick="loadTasks()">重试</button>
         <button class="btn btn-back" style="margin-left:8px" onclick="goLogin()">重新登录</button>
       </div></div>`;
  }
}

// ── Task View ────────────────────────────────────────────────────────────────
function renderTask() {
  if (S.currentIdx >= S.tasks.length) { S.screen = 'done'; return renderDone(); }
  const task = S.tasks[S.currentIdx];
  const taskType = task.task_type;
  const globalDone = S.doneCount + S.sessionDone;
  const pct = S.totalTasks ? Math.round(globalDone / S.totalTasks * 100) : 0;
  const meta = TASK_META[taskType] || { icon: '?', title: taskType };

  let body = '';
  if (taskType === 'move')               body = renderMoveBody(task);
  else if (taskType === 'style_compare') body = renderStyleCompareBody(task);
  else if (taskType === 'style_label')   body = renderStyleLabelBody(task);
  else                                   body = renderExprModeBody(task);

  return `
  <div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
    <div class="header-strip">
      <span class="annotator-tag">${meta.icon} ${meta.title} · ${esc(S.annotatorId)}</span>
      <span class="task-counter">${globalDone + 1} / ${S.totalTasks}</span>
    </div>
    ${body}
    <div class="action-row" style="justify-content:space-between">
      <button class="btn btn-back" onclick="goBack()" ${S.currentIdx === 0 ? 'disabled style="opacity:.3;cursor:not-allowed"' : ''}>
        ← 上一题
      </button>
      <button class="btn btn-skip" onclick="goLogin()">登出</button>
    </div>
  </div>`;
}

// ── Move ─────────────────────────────────────────────────────────────────────
function renderMoveBody(task) {
  const pickedMoves = pickMoves(task.task_id, 3, task.must_include_move);
  task._pickedMoves = pickedMoves;

  const btns = pickedMoves.map(m => `
    <div class="choice-btn${S.selection == m.id ? ' selected' : ''}"
         onclick="selectOption(${m.id})">
      <div class="choice-name">${esc(m.name)}</div>
      <div class="choice-desc">${esc(m.desc)}</div>
    </div>`).join('');

  return `
  <div class="chat-wrap">
    <div class="bubble-row user">
      <div class="bubble">${esc(task.context_user_text || '（无）')}</div>
      <div class="bubble-avatar">Ta</div>
    </div>
    <div class="bubble-row bot highlight">
      <div class="bubble-avatar">Bot</div>
      <div class="bubble">${esc(task.bot_text || '')}</div>
    </div>
  </div>
  <div class="question-block">
    <div class="question-text">这句 Bot 回复用了哪种<span class="dim-highlight">推进方式</span>？</div>
    <div class="choice-grid cols-2">
      ${btns}
      <div class="choice-btn${S.selection === 0 ? ' selected' : ''}"
           onclick="selectOption(0)">
        <div class="choice-name" style="color:#888">都不是</div>
      </div>
    </div>
  </div>`;
}

// ── Style Compare (B1) ──────────────────────────────────────────────────────
function dimExampleHtml(dim) {
  const ex = DIM_EXAMPLES[dim];
  if (!ex) return '';
  return `<div style="font-size:12px;color:#888;margin-top:6px">
    ${esc(ex.desc)}　｜　<span style="color:#2d8a4e">高</span>：${esc(ex.EH)}　<span style="color:#c0392b">低</span>：${esc(ex.EL)}
  </div>`;
}

function renderStyleCompareBody(task) {
  const dimLabel = DIM_LABELS[task.dimension] || task.dimension;
  return `
  <div class="pairs-wrap">
    <div class="pair-card">
      <div class="pair-label">组 A</div>
      <div class="chat-wrap" style="box-shadow:none;padding:8px 0;margin:0">
        <div class="bubble-row user">
          <div class="bubble" style="font-size:13px">${esc(task.text_a_context)}</div>
          <div class="bubble-avatar" style="width:22px;height:22px;font-size:11px">Ta</div>
        </div>
        <div class="bubble-row bot">
          <div class="bubble-avatar" style="width:22px;height:22px;font-size:11px">Bot</div>
          <div class="bubble" style="font-size:13px">${esc(task.text_a_bot)}</div>
        </div>
      </div>
    </div>
    <div class="pair-card">
      <div class="pair-label">组 B</div>
      <div class="chat-wrap" style="box-shadow:none;padding:8px 0;margin:0">
        <div class="bubble-row user">
          <div class="bubble" style="font-size:13px">${esc(task.text_b_context)}</div>
          <div class="bubble-avatar" style="width:22px;height:22px;font-size:11px">Ta</div>
        </div>
        <div class="bubble-row bot">
          <div class="bubble-avatar" style="width:22px;height:22px;font-size:11px">Bot</div>
          <div class="bubble" style="font-size:13px">${esc(task.text_b_bot)}</div>
        </div>
      </div>
    </div>
  </div>
  <div class="question-block">
    <div class="question-text">
      哪个 Bot 回复<span class="dim-highlight">【${esc(DIM_COMPARE_LABELS[task.dimension] || ('更' + dimLabel))}】</span>？
      ${dimExampleHtml(task.dimension)}
    </div>
    <div class="choice-grid cols-2">
      <div class="choice-btn${S.selection === 'A' ? ' selected' : ''}" onclick="selectOption('A')">
        <div class="choice-name">A ${esc(DIM_COMPARE_LABELS[task.dimension] || ('更' + dimLabel))}</div>
      </div>
      <div class="choice-btn${S.selection === 'B' ? ' selected' : ''}" onclick="selectOption('B')">
        <div class="choice-name">B ${esc(DIM_COMPARE_LABELS[task.dimension] || ('更' + dimLabel))}</div>
      </div>
    </div>
  </div>`;
}

// ── Style Label (B2) ────────────────────────────────────────────────────────
function renderStyleLabelBody(task) {
  const dimLabel = DIM_LABELS[task.dimension] || task.dimension;
  const btns = TIER_LABELS.map(t => `
    <div class="choice-btn${S.selection === t.id ? ' selected' : ''}"
         onclick="selectOption('${t.id}')">
      <div class="choice-name">${esc(t.name)}</div>
    </div>`).join('');

  return `
  <div class="chat-wrap">
    <div class="bubble-row user">
      <div class="bubble">${esc(task.context_user_text || '（无）')}</div>
      <div class="bubble-avatar">Ta</div>
    </div>
    <div class="bubble-row bot highlight">
      <div class="bubble-avatar">Bot</div>
      <div class="bubble">${esc(task.bot_text || '')}</div>
    </div>
  </div>
  <div class="question-block">
    <div class="question-text">
      这句 Bot 回复的<span class="dim-highlight">【${esc(dimLabel)}】</span>程度如何？
      ${dimExampleHtml(task.dimension)}
    </div>
    <div class="choice-grid cols-5">${btns}</div>
  </div>`;
}

// ── ExprMode ─────────────────────────────────────────────────────────────────
function renderExprModeBody(task) {
  const btns = EXPR_MODES.map(m => `
    <div class="choice-btn${S.selection == m.id ? ' selected' : ''}"
         onclick="selectOption(${m.id})">
      <div class="choice-name">${esc(m.name)}</div>
      <div class="choice-desc">${esc(m.desc)}</div>
    </div>`).join('');
  return `
  <div class="chat-wrap">
    <div class="bubble-row user">
      <div class="bubble">${esc(task.context_user_text || '（无）')}</div>
      <div class="bubble-avatar">Ta</div>
    </div>
    <div class="bubble-row bot highlight">
      <div class="bubble-avatar">Bot</div>
      <div class="bubble">${esc(task.bot_text || '')}</div>
    </div>
  </div>
  <div class="question-block">
    <div class="question-text">这句 Bot 回复用了哪种<span class="dim-highlight">表达方式</span>？</div>
    <div class="choice-grid cols-4">${btns}</div>
  </div>`;
}

// ── Selection & Submit ───────────────────────────────────────────────────────
let _submitting = false;
function selectOption(val) {
  if (_submitting) return;
  S.selection = val;
  render();
  setTimeout(() => submitTask(), 250);
}

function skipTask() {
  S.currentIdx++;
  S.selection = null;
  render();
}

function goBack() {
  if (S.currentIdx > 0) {
    S.currentIdx--;
    S.selection = null;
    render();
  }
}

async function submitTask() {
  if (S.selection === null || _submitting) return;
  _submitting = true;
  const task = S.tasks[S.currentIdx];
  const body = {
    task_type:    task.task_type,
    annotator_id: S.annotatorId,
    task_id:      task.task_id,
    answer:       S.selection,
  };

  try {
    await fetch('/annotation/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!S.submittedTaskIds[task.task_id]) {
      S.submittedTaskIds[task.task_id] = true;
      S.sessionDone++;
    }
    S.currentIdx++;
    S.selection = null;
    if (S.currentIdx >= S.tasks.length) S.screen = 'done';
    render();
  } catch (e) {
    alert('提交失败，请检查网络：' + String(e));
  } finally {
    _submitting = false;
  }
}

// ── Done ─────────────────────────────────────────────────────────────────────
function renderDone() {
  const totalDone = S.doneCount + S.sessionDone;
  return `
  <div class="done-wrap">
    <div class="done-icon">🎉</div>
    <h2>全部完成！</h2>
    <p>感谢您的参与，您的标注数据已保存。</p>
    <div class="stats-row">
      <div class="stat-pill"><strong>${S.sessionDone}</strong>本次完成</div>
      <div class="stat-pill"><strong>${totalDone}</strong>累计完成</div>
      <div class="stat-pill"><strong>${S.totalTasks}</strong>总题数</div>
    </div>
    <div style="margin-top:28px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="loadTasks()">刷新任务</button>
      <button class="btn btn-back" onclick="goLogin()">换人</button>
    </div>
  </div>`;
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  const saved = localStorage.getItem('annotation_annotator_id');
  if (saved) {
    S.annotatorId = saved;
    await loadTasks();
  } else {
    render();
  }
})();
</script>
</body>
</html>
