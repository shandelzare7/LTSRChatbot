# 全参数动量公式常量（strategy_resolver 中 _compute_momentum_next 使用）
# 每轮开始与写回时 conversation_momentum 的下限，不得低于此值
momentum_floor: 0.4

# EMA 融合：Score_raw 中本轮推力权重，上一回合惯性权重 = (1 - ema_alpha)
ema_alpha: 0.15

# 检测到的敌意 (hostility_level 0-10) 对冲量的惩罚系数
hostility_penalty_coef: 0.75

# E_turn 三项权重：engagement_level（用户投入度）、topic_appeal（话题对 Bot 吸引力）、r_base（关系基值）
# engagement / topic_appeal 奖励降为原来一半，减弱“投入高/话题好”对动量的抬升
e_turn_e_user_weight: 0.275   # 原 0.55 的一半
e_turn_t_bot_weight: 0.375   # 原 0.75 的一半
e_turn_r_base_weight: 0.3

# PAD Arousal 参与计算时的范围与乘数
# _arousal_clamped 将 arousal 归一化到 [range_min, range_max]
# 语义：高唤醒(arousal>0) = 更愿意聊 → Multiplier_arousal = 1.0 + (Arousal * multiplier_coef)，抬动量
arousal:
  range_min: -1.0
  range_max: 1.0
  multiplier_coef: 0.3  # 限制在 0.3，防止 arousal 过于主导

# 轮次疲劳惩罚（0~100 量纲）：从 start_turn 轮之后每轮施加 per_turn 点惩罚
fatigue:
  start_turn: 20    # 从第 20 轮开始
  per_turn: 1.5     # 每轮 1.5 点（0~100 量纲），约合动量 0.015/轮
