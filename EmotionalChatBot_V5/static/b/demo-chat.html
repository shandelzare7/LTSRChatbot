<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对话</title>
    <link rel="stylesheet" href="/static/b/styles.css">
</head>
<body>
    <div class="app-shell">
        <div class="b-chat-header">
            <div class="b-chat-header-left">
                <div id="chat-header-avatar" class="avatar">陆</div>
                <h1 id="chat-header-title" class="h1">对话中 · 陆燃</h1>
                <div id="user-db-id" class="b-user-id"><span class="user-id-text">会话ID: 0e569ae3-314e-455b-93a9-cee7f52203c2</span><button type="button" class="user-id-copy" title="复制">📋</button></div>
            </div>
            <div class="b-chat-header-right">
                <a href="demo.html" class="btn-secondary">返回首页</a>
            </div>
        </div>
        <div id="chat-messages" class="b-chat-messages">
            <div class="b-msg-row msg-me">
                <div class="msg msg--me">你呢</div>
                <div class="msg-meta">2026-02-20 02:48:15</div>
            </div>
            <div class="b-msg-row msg-bot">
                <div class="msg msg--bot">我的趣事?那可多了去了!</div>
                <div class="msg-meta">2026-02-20 02:48:43</div>
            </div>
            <div class="b-msg-row msg-bot">
                <div class="msg msg--bot">有次我在台上讲笑话, 结果自己笑得停不下来, 观众都跟着乐!</div>
                <div class="msg-meta">2026-02-20 02:48:43</div>
            </div>
            <div class="b-msg-row msg-me">
                <div class="msg msg--me">怎么不说话啊</div>
                <div class="msg-meta">2026-02-20 02:53:24</div>
            </div>
            <div class="b-msg-row msg-bot">
                <div class="msg msg--bot">哎哟,没掉线,只是沉浸在刚才的趣事里了!</div>
                <div class="msg-meta">2026-02-20 02:54:04</div>
            </div>
            <div class="b-msg-row msg-bot">
                <div class="msg msg--bot">你有没有什么想分享的趣事?</div>
                <div class="msg-meta">2026-02-20 02:54:04</div>
            </div>
        </div>
        <div class="chat-input-bar">
            <div class="chat-input">
                <input type="text" placeholder="输入消息..." autocomplete="off" readonly />
                <button type="button" class="btn-primary btn-send">发送</button>
            </div>
        </div>
        <p class="subtle" style="text-align:center; margin-top:12px;"><a href="demo.html" style="color:var(--primary);">返回选 Bot</a></p>
    </div>
</body>
</html>
